apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: cockroachdb
  name: jenkins-cockroach-reader

rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/exec
    - services
    - persistentvolumeclaims
  verbs:
    - get
    - list
    - watch
    - create

- apiGroups: ["apps"]
  resources:
    - statefulsets
  verbs:
    - get
    - list
    - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-cockroach-reader-binding
  namespace: cockroachdb

subjects:
- kind: ServiceAccount
  name: default
  namespace: jenkins

roleRef:
  kind: Role
  name: jenkins-cockroach-reader
  apiGroup: rbac.authorization.k8s.io