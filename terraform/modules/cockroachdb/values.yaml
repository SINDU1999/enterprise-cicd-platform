statefulset:
  replicas: 3

storage:
  persistentVolume:
    enabled: true
    size: 100Gi
    storageClass: gp3-encrypted

tls:
  enabled: false

service:
  type: ClusterIP

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"

  limits:
    cpu: "1"
    memory: "2Gi"

conf:
  cache: "25%"
  max-sql-memory: "25%"